docs_dir: docs

types:
  rfc:
    enabled: true
    dir: rfc
    template: ""
    id_prefix: "RFC"
    id_width: 4
    statuses:
      - Draft
      - Proposed
      - Accepted
      - Rejected
      - Superseded
    status_field: "status"

  adr:
    enabled: true
    dir: adr
    template: ""
    id_prefix: "ADR"
    id_width: 4
    statuses:
      - Proposed
      - Accepted
      - Deprecated
      - Superseded
    status_field: "status"

  design:
    enabled: true
    dir: design
    template: ""
    id_prefix: "DESIGN"
    id_width: 4
    statuses:
      - Draft
      - In Review
      - Approved
      - Implemented
      - Abandoned
    status_field: "status"

  impl:
    enabled: true
    dir: impl
    template: ""
    id_prefix: "IMPL"
    id_width: 4
    statuses:
      - Draft
      - In Progress
      - Completed
      - Paused
      - Cancelled
    status_field: "status"

index:
  auto_update: true
  preserve_header: true

author:
  from_git: true
  default: ""
