---
# Server Price Tracker Configuration

server:
  host: "0.0.0.0"
  port: 8080
  read_timeout: 30s
  write_timeout: 30s

database:
  host: localhost
  port: 5432
  name: server_price_tracker
  user: tracker
  password: "${DB_PASSWORD}"
  sslmode: disable
  pool_size: 10

ebay:
  # Browse API credentials
  # Get these from https://developer.ebay.com/my/keys
  app_id: "${EBAY_APP_ID}"
  cert_id: "${EBAY_CERT_ID}"
  # Override for sandbox: https://api.sandbox.ebay.com/identity/v1/oauth2/token
  token_url: "${EBAY_TOKEN_URL}"
  # Override for sandbox: https://api.sandbox.ebay.com/buy/browse/v1/item_summary/search
  browse_url: "${EBAY_BROWSE_URL}"
  # Analytics API URL (defaults to production, no sandbox equivalent)
  # analytics_url: "https://api.ebay.com/developer/analytics/v1_beta/rate_limit/"
  # Marketplace (EBAY_US, EBAY_UK, etc.)
  marketplace: EBAY_US
  # Max API calls per ingestion cycle
  max_calls_per_cycle: 50
  # Rate limiting for eBay API (rolling 24-hour window)
  rate_limit:
    # Requests per second (token bucket rate)
    per_second: 5
    # Burst size (token bucket burst)
    burst: 10
    # Daily API call limit (eBay production: 5000)
    daily_limit: 5000

llm:
  # Options: ollama, anthropic, openai_compat
  backend: ollama

  ollama:
    endpoint: http://localhost:11434
    model: mistral:7b-instruct-v0.3-q5_K_M
    # Alternative: llama3.1:8b

  anthropic:
    # Model to use (claude-haiku-4-20250514 recommended for extraction)
    model: claude-haiku-4-20250514
    # API key via environment: ANTHROPIC_API_KEY

  openai_compat:
    endpoint: http://localhost:8080/v1
    model: mistral-7b

  # Grammar enforcement (Ollama/llama.cpp only, ignored for anthropic)
  use_grammar: true
  # Max concurrent extraction requests
  concurrency: 4
  # Timeout per extraction
  timeout: 30s

scoring:
  weights:
    price: 0.40
    seller: 0.20
    condition: 0.15
    quantity: 0.10
    quality: 0.10
    time: 0.05
  # Minimum samples needed for baseline to be used
  min_baseline_samples: 10
  # Rolling window for baseline computation
  baseline_window_days: 90

schedule:
  # How often to poll eBay for each watch
  ingestion_interval: 15m
  # How often to recompute price baselines
  baseline_interval: 6h
  # Stagger watch polling to avoid API bursts
  stagger_offset: 30s

notifications:
  # Primary: Discord webhooks
  discord:
    enabled: true
    webhook_url: "${DISCORD_WEBHOOK_URL}"
    # Optional defensive sleep between chunks (in addition to
    # X-RateLimit-driven waits). Set to e.g. "100ms" if a busy webhook
    # repeatedly trips global limits despite header-driven waits.
    # Default 0s (no extra delay).
    inter_chunk_delay: 0s
    # Collapse each scheduler tick into a single summary embed instead
    # of per-alert messages. The /alerts page becomes the work surface
    # — operators triage there and Discord becomes a "you have N new
    # things" tap. Default false (rich per-alert embeds).
    summary_only: false

  # Optional: generic webhook
  webhook:
    enabled: false
    url: ""
    headers:
      Authorization: "Bearer ${WEBHOOK_TOKEN}"

# Embedded alert review UI at /alerts (DESIGN-0010).
web:
  # Set to false to disable the entire /alerts route group on this deploy.
  enabled: true
  # Absolute base URL used to deep-link from Discord summary embeds back
  # to the dashboard. Empty = link omitted.
  alerts_url_base: "https://spt.example.com"

logging:
  level: info
  format: text  # text or json

# OpenTelemetry, Langfuse, and LLM-as-judge observability
# (DESIGN-0016 / IMPL-0019). All three subtrees are independently
# disable-able. Defaults below mirror today's behaviour: every
# subtree off, the app emits Prometheus metrics + slog as before.
observability:
  # OTel SDK: traces + metrics over OTLP/gRPC to a Collector. App
  # always emits 100% of spans; sampling decisions live in the
  # Collector's tail_sampling processor (platform-side).
  otel:
    enabled: false
    # OTLP/gRPC endpoint, e.g. "otel-collector.observability:4317".
    endpoint: ""
    service_name: "server-price-tracker"
    # Skip TLS for local/dev collectors.
    insecure: false
    timeout: 10s
  # In-house Langfuse HTTP client (no third-party SDK). Wraps every
  # LLMBackend.Generate call as a Langfuse generation. Async +
  # bounded buffer absorbs transient outages — see
  # spt_langfuse_buffer_* metrics for buffer health.
  langfuse:
    enabled: false
    endpoint: ""  # e.g. "https://langfuse.example.com"
    public_key: "${LANGFUSE_PUBLIC_KEY}"
    secret_key: "${LANGFUSE_SECRET_KEY}"
    buffer_size: 1000
    timeout: 10s
    # Optional per-model rate table. Empty → CostUSD=0 on each
    # generation and Langfuse falls back to its own server-side rate
    # lookup (which already knows public Anthropic / OpenAI models).
    # Add entries here only for in-house / private models that
    # Langfuse can't price (e.g., Ollama). Rates are USD per million
    # tokens. Example:
    # model_costs:
    #   "claude-haiku-4-5-20251001":
    #     input_usd_per_million: 1.0
    #     output_usd_per_million: 5.0
    model_costs: {}
  # LLM-as-judge worker: scores fired alerts retrospectively for
  # alert-quality grading. Runs as a cron entry every 15m, looks
  # back 6h, hard-cuts spending at $10/day to bound runaway cost.
  # backend/model empty = inherit from llm.backend.
  judge:
    enabled: false
    backend: ""  # "" -> inherit from llm.backend
    model: ""    # "" -> inherit from selected backend
    interval: 15m
    lookback: 6h
    batch_size: 50
    daily_budget_usd: 10.0
