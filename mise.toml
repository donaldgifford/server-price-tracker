[tools]
# Go Packages
"go:github.com/spf13/cobra-cli" = "latest"
"go:golang.org/x/tools/cmd/goimports" = "latest"
"go:github.com/vektra/mockery/v2" = "latest"
"go:github.com/a-h/templ/cmd/templ" = "0.3.1001" # must match github.com/a-h/templ in go.mod — newer CLI emits code referencing APIs not in the older library

# API testing tools
"npm:@apideck/portman" = "latest" # Postman collection + contract tests from OpenAPI
"npm:newman" = "latest"           # Postman CLI test runner

go = "1.25.10"
markdownlint-cli2 = "0.18.1"
yamlfmt = "0.20.0"
yamllint = "1.37.1"
yq = "4.48.1"
prettier = "3.7.4"
golines = "latest"
golangci-lint = "2.8.0"
actionlint = "latest"

# helm
helm = "3.19.0"
helm-cr = "latest"
helm-ct = "latest"
helm-diff = "latest"
helm-docs = "latest"

# repo tools
"github:donaldgifford/docz" = "latest"

# Security
syft = "latest"
"go:golang.org/x/vuln/cmd/govulncheck" = "latest"

# Compliance
"go:github.com/google/go-licenses" = "latest"
