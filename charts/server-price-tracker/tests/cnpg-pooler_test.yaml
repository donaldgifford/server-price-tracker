---
suite: cnpg-pooler
templates:
  - templates/cnpg-pooler.yaml
  - templates/cnpg-pooler-service.yaml
tests:
  # --- Pooler tests ---

  - it: Pooler does not render when cnpg.pooler.enabled is false
    template: templates/cnpg-pooler.yaml
    set:
      cnpg.enabled: true
      cnpg.pooler.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: Pooler does not render when cnpg.enabled is false
    template: templates/cnpg-pooler.yaml
    set:
      cnpg.enabled: false
      cnpg.pooler.enabled: true
    asserts:
      - hasDocuments:
          count: 0

  - it: Pooler renders with correct apiVersion and kind
    template: templates/cnpg-pooler.yaml
    set:
      cnpg.enabled: true
      cnpg.pooler.enabled: true
    asserts:
      - isKind:
          of: Pooler
      - equal:
          path: apiVersion
          value: postgresql.cnpg.io/v1

  - it: Pooler has correct name
    template: templates/cnpg-pooler.yaml
    set:
      cnpg.enabled: true
      cnpg.pooler.enabled: true
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-server-price-tracker-db-pooler

  - it: Pooler references CNPG cluster name
    template: templates/cnpg-pooler.yaml
    set:
      cnpg.enabled: true
      cnpg.pooler.enabled: true
    asserts:
      - equal:
          path: spec.cluster.name
          value: RELEASE-NAME-server-price-tracker-db

  - it: Pooler has correct default values
    template: templates/cnpg-pooler.yaml
    set:
      cnpg.enabled: true
      cnpg.pooler.enabled: true
    asserts:
      - equal:
          path: spec.type
          value: rw
      - equal:
          path: spec.instances
          value: 1
      - equal:
          path: spec.pgbouncer.poolMode
          value: transaction

  - it: Pooler instances are configurable
    template: templates/cnpg-pooler.yaml
    set:
      cnpg.enabled: true
      cnpg.pooler.enabled: true
      cnpg.pooler.instances: 3
    asserts:
      - equal:
          path: spec.instances
          value: 3

  - it: PgBouncer parameters are configurable
    template: templates/cnpg-pooler.yaml
    set:
      cnpg.enabled: true
      cnpg.pooler.enabled: true
      cnpg.pooler.pgbouncer.poolMode: session
      cnpg.pooler.pgbouncer.defaultPoolSize: 50
      cnpg.pooler.pgbouncer.maxClientConnections: 200
    asserts:
      - equal:
          path: spec.pgbouncer.poolMode
          value: session
      - equal:
          path: spec.pgbouncer.parameters.default_pool_size
          value: "50"
      - equal:
          path: spec.pgbouncer.parameters.max_client_conn
          value: "200"

  - it: extra pgbouncer parameters are rendered
    template: templates/cnpg-pooler.yaml
    set:
      cnpg.enabled: true
      cnpg.pooler.enabled: true
      cnpg.pooler.pgbouncer.parameters:
        log_connections: "1"
        log_disconnections: "1"
    asserts:
      - equal:
          path: spec.pgbouncer.parameters.log_connections
          value: "1"
      - equal:
          path: spec.pgbouncer.parameters.log_disconnections
          value: "1"

  - it: monitoring enablePodMonitor is configurable
    template: templates/cnpg-pooler.yaml
    set:
      cnpg.enabled: true
      cnpg.pooler.enabled: true
      cnpg.pooler.monitoring.enablePodMonitor: true
    asserts:
      - equal:
          path: spec.monitoring.enablePodMonitor
          value: true

  - it: Pooler has standard labels
    template: templates/cnpg-pooler.yaml
    set:
      cnpg.enabled: true
      cnpg.pooler.enabled: true
    asserts:
      - isSubset:
          path: metadata.labels
          content:
            app.kubernetes.io/name: server-price-tracker
            app.kubernetes.io/instance: RELEASE-NAME
            app.kubernetes.io/managed-by: Helm

  # --- Pooler LoadBalancer Service tests ---

  - it: Service does not render when cnpg.pooler.service.enabled is false
    template: templates/cnpg-pooler-service.yaml
    set:
      cnpg.enabled: true
      cnpg.pooler.enabled: true
      cnpg.pooler.service.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: Service does not render when cnpg.pooler.enabled is false
    template: templates/cnpg-pooler-service.yaml
    set:
      cnpg.enabled: true
      cnpg.pooler.enabled: false
      cnpg.pooler.service.enabled: true
    asserts:
      - hasDocuments:
          count: 0

  - it: Service does not render when cnpg.enabled is false
    template: templates/cnpg-pooler-service.yaml
    set:
      cnpg.enabled: false
      cnpg.pooler.enabled: true
      cnpg.pooler.service.enabled: true
    asserts:
      - hasDocuments:
          count: 0

  - it: Service renders as LoadBalancer with correct name
    template: templates/cnpg-pooler-service.yaml
    set:
      cnpg.enabled: true
      cnpg.pooler.enabled: true
      cnpg.pooler.service.enabled: true
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: RELEASE-NAME-server-price-tracker-db-pooler-lb
      - equal:
          path: spec.type
          value: LoadBalancer

  - it: Service targets port 5432 with CNPG pooler selector
    template: templates/cnpg-pooler-service.yaml
    set:
      cnpg.enabled: true
      cnpg.pooler.enabled: true
      cnpg.pooler.service.enabled: true
    asserts:
      - equal:
          path: spec.ports[0].port
          value: 5432
      - equal:
          path: spec.ports[0].targetPort
          value: 5432
      - equal:
          path: spec.ports[0].protocol
          value: TCP
      - isSubset:
          path: spec.selector
          content:
            cnpg.io/poolerName: RELEASE-NAME-server-price-tracker-db-pooler

  - it: Service includes Cilium BGP labels by default
    template: templates/cnpg-pooler-service.yaml
    set:
      cnpg.enabled: true
      cnpg.pooler.enabled: true
      cnpg.pooler.service.enabled: true
    asserts:
      - isSubset:
          path: metadata.labels
          content:
            bgp.cilium.io/advertise-service: default
            bgp.cilium.io/ip-pool: default

  - it: Service renders annotations when provided
    template: templates/cnpg-pooler-service.yaml
    set:
      cnpg.enabled: true
      cnpg.pooler.enabled: true
      cnpg.pooler.service.enabled: true
      cnpg.pooler.service.annotations:
        test-annotation: db.example.com
    asserts:
      - isSubset:
          path: metadata.annotations
          content:
            test-annotation: db.example.com

  - it: Service has standard labels
    template: templates/cnpg-pooler-service.yaml
    set:
      cnpg.enabled: true
      cnpg.pooler.enabled: true
      cnpg.pooler.service.enabled: true
    asserts:
      - isSubset:
          path: metadata.labels
          content:
            app.kubernetes.io/name: server-price-tracker
            app.kubernetes.io/instance: RELEASE-NAME
            app.kubernetes.io/managed-by: Helm
