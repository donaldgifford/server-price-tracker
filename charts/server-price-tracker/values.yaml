---
replicaCount: 1

image:
  repository: ghcr.io/donaldgifford/server-price-tracker
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
# fsGroup: 2000

securityContext: {}
# capabilities:
#   drop:
#   - ALL
# readOnlyRootFilesystem: true
# runAsNonRoot: true
# runAsUser: 1000

service:
  type: ClusterIP
  port: 8080

# -- Application configuration (mirrors Go Config struct).
# Non-secret values are rendered as literals. Secret values use ${ENV_VAR}
# placeholders resolved at runtime by os.ExpandEnv().
config:
  server:
    host: "0.0.0.0"
    port: 8080
    read_timeout: 30s
    write_timeout: 30s

  database:
    host: "${DB_HOST}"
    port: 5432
    name: "${DB_NAME}"
    user: "${DB_USER}"
    password: "${DB_PASSWORD}"
    sslmode: require
    pool_size: 10

  ebay:
    app_id: "${EBAY_APP_ID}"
    cert_id: "${EBAY_CERT_ID}"
    token_url: "${EBAY_TOKEN_URL}"
    browse_url: "${EBAY_BROWSE_URL}"
    marketplace: EBAY_US
    max_calls_per_cycle: 50
    rate_limit:
      per_second: 5
      burst: 10
      daily_limit: 5000

  llm:
    backend: ollama
    ollama:
      endpoint: "http://ollama.ollama.svc:11434"
      model: "mistral:7b-instruct-v0.3-q5_K_M"
    anthropic:
      model: ""
    openai_compat:
      endpoint: ""
      model: ""
    use_grammar: true
    concurrency: 4
    timeout: 30s

  scoring:
    weights:
      price: 0.40
      seller: 0.20
      condition: 0.15
      quantity: 0.10
      quality: 0.10
      time: 0.05
    min_baseline_samples: 10
    baseline_window_days: 90

  schedule:
    ingestion_interval: 30m
    baseline_interval: 6h
    stagger_offset: 30s
    # re_extraction_interval: 0 means disabled. Set to e.g. "6h" to enable
    # scheduled re-extraction of listings with incomplete extraction data.
    re_extraction_interval: ""

  notifications:
    discord:
      enabled: true
      webhook_url: "${DISCORD_WEBHOOK_URL}"
      # Defensive sleep between chunks beyond X-RateLimit-driven waits.
      # Set to e.g. "100ms" if a busy webhook trips global limits.
      # Default 0s = no extra delay.
      inter_chunk_delay: "0s"
      # Collapse each scheduler tick into one summary embed instead
      # of per-alert messages. The /alerts page becomes the work
      # surface. Default false (rich per-alert embeds).
      summary_only: false

  # Embedded alert review UI at /alerts (DESIGN-0010 / IMPL-0015 Phase 4).
  web:
    # Set to false to skip mounting the /alerts route group on this deploy.
    enabled: true
    # Absolute base URL used to deep-link from Discord summary embeds back
    # to the dashboard. Empty = link omitted.
    alerts_url_base: ""

  logging:
    level: info
    format: json

  # OpenTelemetry, Langfuse, and LLM-as-judge observability
  # (DESIGN-0016 / IMPL-0019). All three subtrees are independently
  # disable-able and default off. With every flag false the running app
  # is byte-identical to a deploy that omits this block entirely — the
  # configmap template renders the keys but the Go loader sees the
  # default-false values and skips all instrumentation. Enable per
  # subtree as the backing infra (Collector, Langfuse, judge LLM) comes
  # online. See `UPGRADE-IMPL-0019.md` for the staged rollout runbook.
  observability:
    # OTel SDK: traces + metrics over OTLP/gRPC to a Collector. The app
    # always emits 100% of spans; sampling decisions live in the
    # Collector's tail_sampling processor (platform-side).
    otel:
      enabled: false
      # OTLP/gRPC endpoint, e.g. "otel-collector.observability:4317".
      endpoint: ""
      service_name: "server-price-tracker"
      # Skip TLS verification — set to true ONLY when targeting an
      # in-cluster Collector over plaintext gRPC. Remote/internet-facing
      # OTLP endpoints leave at false so misconfigs fail loud rather
      # than silently shipping spans (listing titles, prices, trace
      # IDs) over plaintext. See INV-0001 MEDIUM-9.
      insecure: false
      timeout: 10s
    # In-house Langfuse HTTP client (no third-party SDK). Wraps every
    # LLMBackend.Generate call as a Langfuse generation. Async +
    # bounded buffer absorbs transient outages — see
    # spt_langfuse_buffer_* metrics for buffer health.
    langfuse:
      enabled: false
      endpoint: ""
      public_key: "${LANGFUSE_PUBLIC_KEY}"
      secret_key: "${LANGFUSE_SECRET_KEY}"
      buffer_size: 1000
      timeout: 10s
      # Optional per-model rate table for in-house models Langfuse can't
      # price (e.g. local Ollama). Empty → CostUSD=0 and Langfuse falls
      # back to its server-side rate lookup. Keys are model names; values
      # have input_usd_per_million / output_usd_per_million floats.
      model_costs: {}
    # LLM-as-judge worker: scores fired alerts retrospectively for
    # alert-quality grading. Cron entry every `interval`, reviews the
    # last `lookback`, hard-cuts spending at `daily_budget_usd`.
    # backend/model empty → inherit from llm.backend / llm.<backend>.model.
    judge:
      enabled: false
      backend: ""
      model: ""
      interval: 15m
      lookback: 6h
      batch_size: 50
      daily_budget_usd: 10.0

# -- Secret management. Set create=true to render a Secret from values below.
# Set create=false and existingSecret to reference a user-managed Secret.
secret:
  create: true
  existingSecret: ""
  values:
    DB_HOST: "localhost"
    DB_NAME: "spt"
    DB_USER: "spt"
    DB_PASSWORD: ""
    EBAY_APP_ID: ""
    EBAY_CERT_ID: ""
    EBAY_TOKEN_URL: ""
    EBAY_BROWSE_URL: ""
    DISCORD_WEBHOOK_URL: ""
    ANTHROPIC_API_KEY: ""

# -- Migration init container
migration:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 15

readinessProbe:
  httpGet:
    path: /readyz
    port: http
  initialDelaySeconds: 3
  periodSeconds: 10

resources: {}
# requests:
#   cpu: 100m
#   memory: 128Mi
# limits:
#   cpu: 500m
#   memory: 256Mi

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

httpRoute:
  enabled: false
  annotations: {}
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: internal
      namespace: gateway
  hostnames:
    - chart-example.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# -- Extra volumes and volumeMounts for user additions
volumes: []
volumeMounts: []

nodeSelector: {}
tolerations: []
affinity: {}

# -- Helm test hooks
tests:
  connection:
    enabled: true

# -- Prometheus ServiceMonitor
serviceMonitor:
  enabled: false
  interval: 30s
  path: /metrics
  labels: {}

# -- CloudNativePG PostgreSQL cluster
cnpg:
  enabled: false
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:17.2
  bootstrap:
    database: spt
    owner: spt
  storage:
    size: 10Gi
    storageClass: ""
  monitoring:
    enablePodMonitor: false
    customQueriesConfigMap: []
    # - name: cnpg-default-monitoring
    #   key: queries
  managed:
    services:
      # Disable read-only and read replica services (single-instance doesn't need them)
      disabledDefaultServices: ["ro", "r"]
  postgresql:
    parameters:
      max_connections: "200"
      shared_buffers: "256MB"
      timezone: "UTC"
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi
  # -- CNPG Pooler (PgBouncer connection pooling)
  pooler:
    enabled: false
    # -- Pooler type: rw (read-write primary) or ro (read-only replicas)
    type: rw
    instances: 1
    pgbouncer:
      # -- PgBouncer pool mode: session, transaction, or statement
      poolMode: transaction
      defaultPoolSize: 25
      maxClientConnections: 100
      # -- Extra pgbouncer.ini parameters (key-value pairs)
      parameters: {}
    monitoring:
      enablePodMonitor: false
    # -- LoadBalancer Service for external database access
    # Cilium does not support TCPRoute (github.com/cilium/cilium/issues/42016),
    # so we use a LoadBalancer Service with BGP advertisement instead.
    service:
      enabled: false
      type: LoadBalancer
      annotations: {}
      # -- Cilium BGP labels for IP advertisement
      labels:
        bgp.cilium.io/advertise-service: default
        bgp.cilium.io/ip-pool: default

# -- Ollama LLM backend (StatefulSet)
ollama:
  enabled: false
  image:
    repository: ollama/ollama
    tag: latest
    pullPolicy: IfNotPresent
  model: "mistral:7b-instruct-v0.3-q5_K_M"
  gpu:
    enabled: true
    count: 1
  nodeSelector:
    nvidia.com/gpu.present: "true"
  persistence:
    enabled: true
    size: 30Gi
    storageClass: ""
  resources:
    requests:
      cpu: "1"
      memory: 4Gi
    limits:
      cpu: "4"
      memory: 8Gi
