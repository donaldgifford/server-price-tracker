---
# CI-only values for chart install testing in kind.
# Disables components that require external dependencies.

image:
  repository: nginx
  tag: alpine
  pullPolicy: IfNotPresent

# Override args so nginx doesn't receive "--config" flags it can't handle
command: ["nginx", "-g", "daemon off;"]
args: []

migration:
  enabled: false

livenessProbe: null
readinessProbe: null

tests:
  connection:
    enabled: false

cnpg:
  enabled: false
  pooler:
    enabled: false

ollama:
  enabled: false

config:
  notifications:
    discord:
      enabled: false
