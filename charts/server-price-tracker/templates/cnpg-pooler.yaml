{{- if and .Values.cnpg.enabled .Values.cnpg.pooler.enabled }}
apiVersion: postgresql.cnpg.io/v1
kind: Pooler
metadata:
  name: {{ include "server-price-tracker.cnpgPoolerName" . }}
  labels:
    {{- include "server-price-tracker.labels" . | nindent 4 }}
spec:
  cluster:
    name: {{ include "server-price-tracker.cnpgClusterName" . }}
  type: {{ .Values.cnpg.pooler.type }}
  instances: {{ .Values.cnpg.pooler.instances }}

  pgbouncer:
    poolMode: {{ .Values.cnpg.pooler.pgbouncer.poolMode }}
    parameters:
      default_pool_size: {{ .Values.cnpg.pooler.pgbouncer.defaultPoolSize | quote }}
      max_client_conn: {{ .Values.cnpg.pooler.pgbouncer.maxClientConnections | quote }}
      {{- range $key, $value := .Values.cnpg.pooler.pgbouncer.parameters }}
      {{ $key }}: {{ $value | quote }}
      {{- end }}

  monitoring:
    enablePodMonitor: {{ .Values.cnpg.pooler.monitoring.enablePodMonitor }}
{{- end }}
